<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>BestBowl</title>
<style>
  :root{
    --brand:#1D9E75; --brand-bg:#f5fbf8;
    --amber:#BA7517;
    --ink:#1c1c1a; --muted:#8a8a85; --muted2:#b3b3ad;
    --line:#ececea; --field:#f2f2f0;
    --dog-bg:#E8F8F2; --cat-bg:#FEF3E2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:#fff;color:var(--ink);
    font-family:system-ui,-apple-system,sans-serif;
    font-size:14px;line-height:1.4;
  }
  .app{max-width:640px;margin:0 auto;background:#fff;min-height:100vh;position:relative;}
  .small{font-size:12px;}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:20;background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
    padding:10px 16px 12px;
  }
  .bar1{display:flex;align-items:center;justify-content:space-between;height:36px;}
  .logo{font-size:18px;font-weight:700;letter-spacing:-.3px;}
  .logo .b{color:var(--ink);} .logo .o{color:var(--brand);}
  .icon-btn{
    width:40px;height:40px;border:none;background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink);margin-right:-8px;
  }
  .search{
    display:flex;align-items:center;gap:8px;background:var(--field);
    border-radius:12px;padding:0 12px;height:44px;margin-top:10px;
  }
  .search svg{flex:0 0 auto;color:var(--muted);}
  .search input{
    border:none;background:transparent;outline:none;width:100%;height:100%;
    font-size:14px;color:var(--ink);font-family:inherit;
  }
  .pills{
    display:flex;gap:8px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .pills::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:999px;padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;
    min-height:32px;
  }
  .pill.active{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600;}

  /* ---------- list toolbar ---------- */
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;}
  .count{font-size:12px;color:var(--muted);}
  .sort{position:relative;}
  .sort select{
    -webkit-appearance:none;appearance:none;border:1px solid var(--line);background:#fff;
    color:var(--ink);font-size:12px;font-family:inherit;border-radius:8px;
    padding:7px 26px 7px 10px;cursor:pointer;min-height:32px;
  }
  .sort svg{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}

  /* ---------- cards ---------- */
  .list{padding:6px 12px 40px;}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.05);margin-top:10px;overflow:hidden;
  }
  .row{
    display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;min-height:44px;
  }
  .thumb{
    flex:0 0 auto;width:40px;height:40px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .thumb.dog{background:var(--dog-bg);color:var(--brand);}
  .thumb.cat{background:var(--cat-bg);color:var(--amber);}
  .pname{
    flex:1;min-width:0;font-size:14px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .bestprice{flex:0 0 auto;font-size:14px;font-weight:700;}
  .score{
    flex:0 0 auto;width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#fff;
  }
  .chev{flex:0 0 auto;color:var(--muted);transition:transform .3s ease,color .3s ease;display:flex;}
  .card.open .chev{transform:rotate(180deg);color:var(--brand);}

  .expand{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .card.open .expand{max-height:640px;}
  .divider{height:1px;background:var(--line);margin:0 12px;}

  .ipills{display:flex;flex-wrap:wrap;gap:6px;padding:12px 12px 4px;}
  .ipill{font-size:11px;color:var(--muted);background:var(--field);border-radius:999px;padding:3px 9px;}

  .stores{padding:4px 8px 8px;}
  .store{
    display:flex;align-items:center;gap:10px;padding:10px 8px;min-height:44px;cursor:pointer;
    border-radius:8px;
  }
  .store + .store{border-top:1px solid var(--line);}
  .store.best{background:var(--brand-bg);}
  .sname{flex:0 0 76px;font-size:14px;font-weight:600;text-transform:capitalize;display:flex;flex-direction:column;gap:2px;}
  .badge{display:inline-block;font-size:10px;font-weight:700;color:var(--brand);letter-spacing:.3px;}
  .pcol{flex:1;min-width:0;}
  .pmain{font-size:14px;font-weight:700;}
  .psub{font-size:11px;color:var(--muted);margin-top:1px;}
  .strike{text-decoration:line-through;color:var(--muted2);}
  .vscore{flex:0 0 auto;font-size:14px;font-weight:700;color:var(--muted);min-width:34px;text-align:right;}
  .vscore.best{color:var(--brand);}
  .ext{flex:0 0 auto;color:var(--muted);display:flex;width:24px;justify-content:flex-end;}
  .savings{padding:8px 14px 14px;font-size:12px;color:var(--brand);font-weight:600;}

  /* ---------- states ---------- */
  .state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;text-align:center;}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--field);border-top-color:var(--brand);animation:spin .8s linear infinite;margin-bottom:14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .state .t1{font-size:14px;color:var(--muted);}
  .state .t2{font-size:12px;color:var(--muted2);margin-top:4px;}
  .state .ei{color:var(--muted2);margin-bottom:12px;}

  /* ---------- drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:30;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:264px;max-width:80vw;background:#fff;z-index:40;
    transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,.12);
    display:flex;flex-direction:column;padding:14px 8px;
  }
  .drawer.open{transform:translateX(0);}
  .drawer-top{display:flex;justify-content:flex-end;}
  .drawer a{
    display:block;padding:14px 14px;font-size:14px;color:var(--ink);text-decoration:none;border-radius:10px;
  }
  .drawer a:active{background:var(--field);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="bar1">
      <div class="logo"><span class="b">Best</span><span class="o">Bowl</span></div>
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="search" placeholder="Search brand or food..." autocomplete="off" />
    </div>
    <div class="pills" id="pills">
      <button class="pill active" data-kind="all">All</button>
      <button class="pill" data-kind="pet" data-val="dog">Dog</button>
      <button class="pill" data-kind="pet" data-val="cat">Cat</button>
      <button class="pill" data-kind="food" data-val="dry">Dry</button>
      <button class="pill" data-kind="food" data-val="wet">Wet</button>
      <button class="pill" data-kind="food" data-val="treat">Treats</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="count" id="count"></div>
    <div class="sort">
      <select id="sort" aria-label="Sort">
        <option value="value">Best value</option>
        <option value="price">Lowest price</option>
        <option value="quality">Highest quality</option>
      </select>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6"/></svg>
    </div>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="scrim" id="scrim"></div>
<nav class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-top">
    <button class="icon-btn" id="closeBtn" aria-label="Close menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6l-12 12M6 6l12 12"/></svg>
    </button>
  </div>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">How it works</a>
  <a href="#">Contact</a>
</nav>

<script>
  const SUPABASE_URL = "https://skkilfwlehvgxlmrbfsa.supabase.co";
  const ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2lsZndsZWh2Z3hsbXJiZnNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjUzODcsImV4cCI6MjA5NzgwMTM4N30.cjTf5yhOqTCBNpzWIUIOCt5iAUMdxkDX6Sy4bzd4yEo";

  const $ = (s) => document.querySelector(s);
  const listEl = $("#list");
  const countEl = $("#count");
  const inputEl = $("#q");

  // filter state
  let petType = "";   // "", "dog", "cat"
  let foodType = "";   // "", "dry", "wet", "treat"
  let sort = "value";
  let seq = 0;
  let debounce = null;

  // ---------- icons ----------
  const DOG_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18"/><path d="M5 11l1.4 7a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2 -1.6L19 11"/><path d="M8 11a4 4 0 0 1 8 0"/></svg>';
  const CAT_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l3.6 3.2A8.5 8.5 0 0 1 12 6c1.6 0 3.1 .4 4.4 1.2L20 4v8.5a8 8 0 0 1 -16 0z"/><circle cx="9.3" cy="12" r="1" fill="#fff"/><circle cx="14.7" cy="12" r="1" fill="#fff"/></svg>';
  const EXT_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6h-6a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-6"/><path d="M11 13l9 -9"/><path d="M15 4h5v5"/></svg>';
  const CHEV = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6"/></svg>';
  const BOWL_BIG = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18"/><path d="M5 11l1.4 7a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2 -1.6L19 11"/><path d="M8 11a4 4 0 0 1 8 0"/></svg>';

  const money = (n) => (n == null ? null : "$" + Number(n).toFixed(2));
  const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);
  const esc = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );

  function scoreColor(v) {
    if (v >= 8) return "var(--brand)";
    if (v >= 7) return "var(--amber)";
    return "#ccc";
  }

  // ---------- pills ----------
  $("#pills").addEventListener("click", (e) => {
    const pill = e.target.closest(".pill");
    if (!pill) return;
    document.querySelectorAll("#pills .pill").forEach((p) => p.classList.toggle("active", p === pill));
    const kind = pill.dataset.kind;
    petType = kind === "pet" ? pill.dataset.val : "";
    foodType = kind === "food" ? pill.dataset.val : "";
    load();
  });

  // ---------- search / sort ----------
  inputEl.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(load, 300);
  });
  $("#sort").addEventListener("change", (e) => { sort = e.target.value; load(); });

  // ---------- drawer ----------
  const drawer = $("#drawer"), scrim = $("#scrim");
  const openMenu = () => { drawer.classList.add("open"); scrim.classList.add("open"); drawer.setAttribute("aria-hidden", "false"); };
  const closeMenu = () => { drawer.classList.remove("open"); scrim.classList.remove("open"); drawer.setAttribute("aria-hidden", "true"); };
  $("#menuBtn").addEventListener("click", openMenu);
  $("#closeBtn").addEventListener("click", closeMenu);
  scrim.addEventListener("click", closeMenu);
  drawer.querySelectorAll("a").forEach((a) => a.addEventListener("click", closeMenu));

  // ---------- fetch ----------
  async function load() {
    const q = inputEl.value.trim();
    const mySeq = ++seq;

    listEl.innerHTML =
      '<div class="state"><div class="spinner"></div><div class="t1">Finding best prices...</div></div>';
    countEl.textContent = "";

    let url = `${SUPABASE_URL}/functions/v1/search?q=${encodeURIComponent(q)}&sort=${sort}`;
    if (petType) url += `&pet_type=${petType}`;

    try {
      const res = await fetch(url, { headers: { apikey: ANON_KEY, Authorization: "Bearer " + ANON_KEY } });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (mySeq !== seq) return; // stale response
      let results = (data && data.results) || [];
      // Dry / Wet / Treats are filtered client-side on category suffix.
      if (foodType) results = results.filter((r) => r.category && r.category.endsWith("_" + foodType));
      render(results);
    } catch (err) {
      if (mySeq !== seq) return;
      listEl.innerHTML = `<div class="state"><div class="t1">Couldn't load results.</div><div class="t2">${esc(err.message)}</div></div>`;
    }
  }

  function render(results) {
    if (!results.length) {
      countEl.textContent = "";
      listEl.innerHTML =
        `<div class="state"><div class="ei">${BOWL_BIG}</div><div class="t1">No products found</div><div class="t2">Try a different search</div></div>`;
      return;
    }
    countEl.textContent = `${results.length} product${results.length === 1 ? "" : "s"}`;
    listEl.innerHTML = results.map(card).join("");
  }

  function card(p) {
    const score = p.quality_score != null ? Number(p.quality_score) : 0;
    const pet = p.pet_type === "cat" ? "cat" : "dog";
    const icon = pet === "cat" ? CAT_ICON : DOG_ICON;
    const sb = p.score_breakdown || {};

    const ipills = [];
    if (sb.first_ingredient) ipills.push(`<span class="ipill">${esc(sb.first_ingredient)}</span>`);
    if (sb.protein_percent != null) ipills.push(`<span class="ipill">${Number(sb.protein_percent)}% protein</span>`);
    if (sb.recall_count != null) ipills.push(`<span class="ipill">${Number(sb.recall_count)} recall${Number(sb.recall_count) === 1 ? "" : "s"}</span>`);

    // most expensive store (for the savings line)
    let maxStore = null, maxEff = -Infinity;
    (p.prices || []).forEach((s) => { if (Number(s.effective_price) > maxEff) { maxEff = Number(s.effective_price); maxStore = s.store; } });

    const stores = (p.prices || []).map((s) => storeRow(s, p)).join("");
    const savings =
      p.savings_vs_most_expensive > 0 && maxStore
        ? `<div class="savings">Save ${money(p.savings_vs_most_expensive)} vs ${cap(maxStore)}</div>`
        : "";

    return `
      <div class="card" data-upc="${esc(p.upc)}">
        <div class="row">
          <div class="thumb ${pet}">${icon}</div>
          <div class="pname">${esc(p.name)}</div>
          <div class="bestprice">${money(p.best_price) || "—"}</div>
          <div class="score" style="background:${scoreColor(score)}">${score.toFixed(1)}</div>
          <div class="chev">${CHEV}</div>
        </div>
        <div class="expand">
          <div class="divider"></div>
          ${ipills.length ? `<div class="ipills">${ipills.join("")}</div>` : ""}
          <div class="stores">${stores}</div>
          ${savings}
        </div>
      </div>`;
  }

  function storeRow(s, p) {
    const isBest = s.store === p.best_value_store;

    let sub = "";
    if (s.autoship_price != null) {
      sub = `<div class="psub">autoship ${money(s.autoship_price)} <span class="strike">${money(s.price)}</span></div>`;
    } else if (s.subscribe_save_price != null) {
      sub = `<div class="psub">sub &amp; save ${money(s.subscribe_save_price)} <span class="strike">${money(s.price)}</span></div>`;
    }

    const v = s.value_score != null ? Number(s.value_score).toFixed(1) : "–";
    const url = s.affiliate_url ? esc(s.affiliate_url) : "";

    return `
      <div class="store ${isBest ? "best" : ""}" ${url ? `data-url="${url}"` : ""} role="link" tabindex="0">
        <div class="sname">${esc(s.store)}${isBest ? '<span class="badge">BEST</span>' : ""}</div>
        <div class="pcol">
          <div class="pmain">${money(s.price) || "—"}</div>
          ${sub}
        </div>
        <div class="vscore ${isBest ? "best" : ""}">${v}</div>
        <div class="ext">${EXT_ICON}</div>
      </div>`;
  }

  // ---------- delegated interactions ----------
  listEl.addEventListener("click", (e) => {
    const store = e.target.closest(".store");
    if (store) {
      if (store.dataset.url) window.open(store.dataset.url, "_blank", "noopener");
      return;
    }
    const row = e.target.closest(".row");
    if (!row) return;
    const card = row.parentElement;
    const wasOpen = card.classList.contains("open");
    document.querySelectorAll(".card.open").forEach((c) => c.classList.remove("open")); // one at a time
    if (!wasOpen) card.classList.add("open");
  });
  listEl.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const store = e.target.closest(".store");
    if (store && store.dataset.url) window.open(store.dataset.url, "_blank", "noopener");
  });

  // initial load: all products, best value
  load();
</script>
</body>
</html>
