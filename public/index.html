<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestBowl — Compare pet food prices &amp; quality</title>
  <style>
    :root {
      --brand: #1D9E75;
      --brand-dark: #157a5a;
      --brand-light: #e7f6f0;
      --ink: #1c2b26;
      --muted: #6b7c76;
      --line: #e4eae8;
      --bg: #f6f9f8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px 64px; }

    /* Header */
    header { text-align: center; padding: 22px 0 6px; }
    .logo { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; color: var(--brand); }
    .logo span { color: var(--ink); }
    .tagline { color: var(--muted); font-size: 15px; margin-top: 2px; }

    /* Search */
    .controls {
      background: #fff; border: 1px solid var(--line); border-radius: 16px;
      padding: 14px; margin-top: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.03);
      position: sticky; top: 10px; z-index: 5;
    }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); }
    input[type="search"] {
      width: 100%; padding: 13px 14px 13px 40px; font-size: 16px;
      border: 1px solid var(--line); border-radius: 11px; outline: none; -webkit-appearance: none;
    }
    input[type="search"]:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }

    .toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--line);
      border-radius: 999px; padding: 4px; margin-top: 12px; }
    .toggle button {
      border: none; background: transparent; color: var(--muted);
      padding: 7px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .toggle button.active { background: var(--brand); color: #fff; }

    .count { color: var(--muted); font-size: 13px; margin: 14px 2px 0; }

    /* States */
    .state { text-align: center; color: var(--muted); padding: 48px 10px; }
    .spinner {
      width: 38px; height: 38px; margin: 0 auto 14px; border-radius: 50%;
      border: 4px solid var(--brand-light); border-top-color: var(--brand);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .card {
      background: #fff; border: 1px solid var(--line); border-radius: 16px;
      padding: 16px; margin-top: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    .card-top { display: flex; gap: 12px; align-items: flex-start; }
    .badge {
      flex: 0 0 auto; width: 52px; height: 52px; border-radius: 50%;
      background: var(--brand); color: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-weight: 800;
    }
    .badge .num { font-size: 18px; line-height: 1; }
    .badge .lbl { font-size: 8px; letter-spacing: .5px; opacity: .9; margin-top: 1px; }
    .card-head { flex: 1; min-width: 0; }
    .pname { font-weight: 700; font-size: 16px; }
    .pbrand { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .meta-line { margin-top: 6px; font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .chip { background: var(--bg); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }
    .chip.real { background: var(--brand-light); color: var(--brand-dark); border-color: transparent; font-weight: 700; }

    /* Store rows */
    .stores { margin-top: 12px; border-top: 1px solid var(--line); }
    .store {
      display: flex; align-items: center; gap: 10px; padding: 11px 8px;
      border-bottom: 1px solid var(--line); border-radius: 10px; cursor: pointer;
      transition: background .12s;
    }
    .store:hover { background: #fafcfb; }
    .store.best { background: var(--brand-light); }
    .store.best:hover { background: #ddf1e9; }
    .store-name { flex: 1; min-width: 0; font-weight: 600; text-transform: capitalize; }
    .best-tag {
      font-size: 10px; font-weight: 800; color: #fff; background: var(--brand);
      padding: 2px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle; text-transform: none;
    }
    .save-note { font-size: 11px; color: var(--brand-dark); font-weight: 600; margin-top: 3px; }
    .price-col { text-align: right; }
    .price { font-weight: 700; font-size: 15px; }
    .sub { font-size: 12px; color: var(--brand-dark); }
    .strike { color: var(--muted); text-decoration: line-through; font-weight: 500; font-size: 12px; }
    .vscore { flex: 0 0 auto; text-align: center; min-width: 52px; }
    .vscore .v { font-weight: 800; font-size: 15px; color: var(--brand); }
    .vscore .l { font-size: 9px; color: var(--muted); letter-spacing: .4px; }

    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Best<span>Bowl</span></div>
      <div class="tagline">Compare pet food prices &amp; quality across every store</div>
    </header>

    <div class="controls">
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7c76" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="q" type="search" placeholder="Search a brand or food…" autocomplete="off" />
      </div>
      <div class="toggle" id="toggle">
        <button data-pet="" class="active">All</button>
        <button data-pet="dog">🐶 Dog</button>
        <button data-pet="cat">🐱 Cat</button>
      </div>
    </div>

    <div id="count" class="count"></div>
    <div id="results"></div>

    <footer>BestBowl demo · prices &amp; quality scores are illustrative</footer>
  </div>

  <script>
    // Public anon key (safe to embed) — lets the demo call the search Edge Function.
    const SUPABASE_URL = "https://skkilfwlehvgxlmrbfsa.supabase.co";
    const ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2lsZndsZWh2Z3hsbXJiZnNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjUzODcsImV4cCI6MjA5NzgwMTM4N30.cjTf5yhOqTCBNpzWIUIOCt5iAUMdxkDX6Sy4bzd4yEo";

    const $ = (s) => document.querySelector(s);
    const resultsEl = $("#results");
    const countEl = $("#count");
    const inputEl = $("#q");

    let petType = "";        // "" = all, "dog", "cat"
    let seq = 0;             // request token to drop stale responses
    let debounceTimer = null;

    const money = (n) => (n == null ? null : "$" + Number(n).toFixed(2));
    const escapeHtml = (str) =>
      String(str ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );

    // --- toggle ---
    $("#toggle").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      petType = btn.dataset.pet;
      document.querySelectorAll("#toggle button").forEach((b) =>
        b.classList.toggle("active", b === btn)
      );
      load();
    });

    // --- search: debounce 300ms ---
    inputEl.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(load, 300);
    });

    async function load() {
      const q = inputEl.value.trim();
      const mySeq = ++seq;

      resultsEl.innerHTML = '<div class="state"><div class="spinner"></div>Loading…</div>';
      countEl.textContent = "";

      let url = `${SUPABASE_URL}/functions/v1/search?q=${encodeURIComponent(q)}&sort=value`;
      if (petType) url += `&pet_type=${petType}`;

      try {
        const res = await fetch(url, {
          headers: { apikey: ANON_KEY, Authorization: "Bearer " + ANON_KEY },
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (mySeq !== seq) return; // a newer request superseded this one
        render(data);
      } catch (err) {
        if (mySeq !== seq) return;
        resultsEl.innerHTML =
          '<div class="state">Couldn\'t load results.<br>' + escapeHtml(err.message) + "</div>";
      }
    }

    function render(data) {
      const results = (data && data.results) || [];
      if (!results.length) {
        countEl.textContent = "";
        resultsEl.innerHTML = '<div class="state">No results found.</div>';
        return;
      }
      const total = (data.meta && data.meta.total_results) || results.length;
      countEl.textContent = `${total} product${total === 1 ? "" : "s"}`;
      resultsEl.innerHTML = results.map(card).join("");
    }

    function card(p) {
      const score = p.quality_score != null ? Number(p.quality_score).toFixed(1) : "–";
      const sb = p.score_breakdown || {};

      const metaBits = [];
      if (sb.first_ingredient) metaBits.push(`<span class="chip">1st: ${escapeHtml(sb.first_ingredient)}</span>`);
      if (sb.protein_percent != null) metaBits.push(`<span class="chip">${Number(sb.protein_percent)}% protein</span>`);
      if (sb.recall_count != null) metaBits.push(`<span class="chip">${Number(sb.recall_count)} recall${Number(sb.recall_count) === 1 ? "" : "s"}</span>`);
      if (sb.data_source) metaBits.push(`<span class="chip ${sb.data_source === "real" ? "real" : ""}">${sb.data_source} data</span>`);

      const stores = (p.prices || []).map((s) => storeRow(s, p)).join("");

      return `
        <div class="card">
          <div class="card-top">
            <div class="badge" title="Quality score">
              <span class="num">${score}</span><span class="lbl">/10</span>
            </div>
            <div class="card-head">
              <div class="pname">${escapeHtml(p.name)}</div>
              ${p.brand ? `<div class="pbrand">${escapeHtml(p.brand)}</div>` : ""}
              ${metaBits.length ? `<div class="meta-line">${metaBits.join("")}</div>` : ""}
            </div>
          </div>
          <div class="stores">${stores}</div>
        </div>`;
    }

    function storeRow(s, p) {
      const isBest = s.store === p.best_value_store;
      const isCheapest =
        p.cheapest_option != null && Number(s.effective_price) === Number(p.cheapest_option);

      // discounted price line (autoship / subscribe & save)
      let sub = "";
      if (s.autoship_price != null) {
        sub = `<div class="sub">autoship ${money(s.autoship_price)} <span class="strike">${money(s.price)}</span></div>`;
      } else if (s.subscribe_save_price != null) {
        sub = `<div class="sub">subscribe &amp; save ${money(s.subscribe_save_price)} <span class="strike">${money(s.price)}</span></div>`;
      }

      // savings note under the cheapest option
      const saveNote =
        isCheapest && p.savings_vs_most_expensive > 0
          ? `<div class="save-note">save ${money(p.savings_vs_most_expensive)} vs most expensive</div>`
          : "";

      const v = s.value_score != null ? Number(s.value_score).toFixed(1) : "–";
      const url = s.affiliate_url ? escapeHtml(s.affiliate_url) : "";

      return `
        <div class="store ${isBest ? "best" : ""}" ${url ? `data-url="${url}"` : ""} role="link" tabindex="0">
          <div class="store-name">
            ${escapeHtml(s.store)}${isBest ? '<span class="best-tag">BEST VALUE</span>' : ""}
            ${saveNote}
          </div>
          <div class="price-col">
            <div class="price">${money(s.price) || "—"}</div>
            ${sub}
          </div>
          <div class="vscore">
            <div class="v">${v}</div><div class="l">VALUE</div>
          </div>
        </div>`;
    }

    // Clicking (or Enter on) a store row opens its affiliate link in a new tab.
    resultsEl.addEventListener("click", (e) => {
      const row = e.target.closest(".store");
      if (row && row.dataset.url) window.open(row.dataset.url, "_blank", "noopener");
    });
    resultsEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const row = e.target.closest(".store");
      if (row && row.dataset.url) window.open(row.dataset.url, "_blank", "noopener");
    });

    // Initial load: ALL products, sorted by value.
    load();
  </script>
</body>
</html>
